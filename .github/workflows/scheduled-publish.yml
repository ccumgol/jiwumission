# 매일 06:00 KST (전날 21:00 UTC)에 사이트를 재빌드해
# 미래 날짜로 예약된 포스트(IT뉴스, 오늘의 QT)를 자동 공개합니다.
name: Scheduled Daily Publish

on:
  schedule:
    # KST 06:00 = UTC 21:00 (전날)
    - cron: "0 21 * * *"
  # 수동으로도 실행 가능
  workflow_dispatch:

permissions:
  contents: write

jobs:
  trigger-rebuild:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create scheduled rebuild commit
        run: |
          DATE=$(TZ="Asia/Seoul" date "+%Y-%m-%d %H:%M KST")
          git commit --allow-empty -m "chore: scheduled daily publish [$DATE]"
          git push origin main
