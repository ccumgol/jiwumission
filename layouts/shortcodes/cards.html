{{ $cols := .Get "cols" | default "3" }}
{{ $mobcols := .Get "mobcols" }}
{{ $responsive := .Get "responsive" }}

{{ if eq $responsive "false" }}
<div class="flex flex-col gap-0 md:grid md:gap-6 md:grid-cols-2 lg:grid-cols-3 mb-12 bg-white dark:bg-darkmode-light border border-border dark:border-darkmode-border rounded-xl p-6 divide-y divide-border dark:divide-darkmode-border md:bg-transparent md:border-0 md:p-0 md:divide-y-0">
  {{ .Inner }}
</div>
{{ else }}
<div class="grid gap-4 md:gap-6 
  {{ if eq $mobcols "2" }}grid-cols-2{{ else if eq $mobcols "3" }}grid-cols-3{{ else }}grid-cols-1{{ end }} 
  {{ if eq $cols "2" }}md:grid-cols-2 max-w-2xl mx-auto{{ else }}md:grid-cols-2 lg:grid-cols-3{{ end }} mb-12">
  {{ .Inner }}
</div>
{{ end }}
