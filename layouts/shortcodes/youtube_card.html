{{ $title := .Get "title" }}
{{ $link := .Get "link" }}
<div class="rounded-xl bg-white dark:bg-darkmode-body border border-border dark:border-darkmode-border p-6 md:p-8 shadow-sm hover:shadow-md transition-all duration-300 flex flex-col justify-between h-full">
  <div>
    <div class="flex items-center gap-3 mb-4">
      <span class="text-red-500 text-3xl"><i class="fa-brands fa-youtube"></i></span>
      <h4 class="text-xl font-secondary font-bold text-text-dark dark:text-white">{{ $title }}</h4>
    </div>
    <div class="text-sm leading-relaxed text-text-light dark:text-darkmode-text-light mb-6">
      {{ .Page.RenderString (dict "display" "block") .Inner }}
    </div>
  </div>
  <div class="border-t border-border dark:border-darkmode-border pt-4">
    <a href="{{ $link }}" target="_blank" rel="noopener" class="text-sm font-bold text-primary hover:text-primary-dark inline-flex items-center gap-1 transition-all">
      채널 바로가기
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
      </svg>
    </a>
  </div>
</div>
